# ==================================
# 1. Function Configuration (Build Optimization)
# ==================================
[functions]
    directory = "functions/"
    # Lock Node.js version for consistency
    node_version = "20"
    # Using esbuild for faster cold starts
    node_bundler = "esbuild"

# ==================================
# 2. Redirects/Proxy (API Endpoints)
# ==================================
[[redirects]]
    # Route all /api/* requests to Netlify functions
    from = "/api/*"
    to = "/.netlify/functions/:splat"
    # Status 200 means this acts as a proxy (rewrite)
    status = 200
